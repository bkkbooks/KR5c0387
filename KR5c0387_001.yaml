body:
  text: 馬王堆漢墓帛書老子甲本德經上德不德是以有德下德不失德是以無德上德無為而無以為也上仁為之而無以為也上義為之而有以為也上禮為之而莫之應也則攘臂而乃之故失道失道矣而后德失德而后仁失仁而后義失義而后禮夫禮者忠信之薄也而亂之首也前識者道之華也而愚之首也是以大丈夫居其厚而不居其泊居其實不居其華故去皮取此昔之得一者天得一以清地得一以寧神得一以霝浴谷得一以盈侯王得一而以為正其致之也胃天毋已清將恐裂胃地毋已寧將恐發胃神毋已霝將恐歇胃浴毋已盈將將恐渴胃侯王毋已貴以高將恐蹶故必貴而以賤為本必高矣而以下為基夫是以侯王自胃曰孤寡不𥞤此其賤之本與非也故致數與無與是故不欲祿祿若玉硌硌若石上士聞道勤能行之中士聞道若存若亡下士聞道大笑之弗笑不足以為道是以建言有之曰明道如費進道如退夷道如類上德如谷大白如辱廣德如不足建德如偷質真如渝大方無隅大器晚成大音希聲大象無形道褒無名夫唯道善始且善成反也者道之動也弱也者道之用也天下之物生於有有生於無道生一一生二二生三三生萬物萬物負陰而抱陽中氣以為和天下之所惡唯孤寡不𥞤而王公以自名也勿或𢿃之而益益之而𢿃故人之所教夕議而教人故強良者不得死我將以為學父天下之至柔馳騁於天下之致堅無有入於無間五是以知無為之有益也不言之教無為之益天下希能及之矣名與身孰親身與貨孰多得與亡孰病甚愛必大費多藏必厚亡故知足不辱知止不殆可以長久大成若缺其用不幣大盈若𥁵其用不𡩫大直如詘大巧如拙大贏如㶧躁勝寒靚勝炅請靚可以為天下正天下有道却走馬以糞天下無道戎馬生於郊罪莫大於可欲𢢸莫大於不知足咎莫憯於欲得故知足之足恆足矣不出於戶以知天下不規於牖以知天道其出也彌遠其知彌少是以聖人不行而知不見而名弗為而成為學者日益聞道者日損損之又損以至於無為無為而無不為將欲取天下也恆無事及其有事也又不足以取天下矣聖人恆無心以百姓之心為心善者善之不善者亦善之得善也信者信之不信者亦信之得信也聖人之在天下𢡁𢡁焉為天下渾心百姓皆屬耳目焉聖人皆咳之出生入死生之徒十有三死之徒十有三而民生生動皆之死地之十有三夫何故也以其生生也蓋聞善執生者陵行不避矢虎入軍不被甲兵矢無所椯其角虎無所昔其蚤兵無所容其刃夫何故也以其無死地焉道生之而德畜之物刑之而器成之是以萬物尊道而貴德道之尊德之貴也夫莫之爵而恆自然也道生之畜之長之遂之亭之之養之覆之生而弗有也為而弗寺也長而弗宰也此之謂玄德天下有始以為天下母得其母以知其子復守其母沒身不殆塞其閉其門終身不堇啓其悶濟其事終身不棘見小曰明守柔曰強用其光復歸其明毋道身央是胃襲常使我𢴲有知也行於大道唯施是畏大道甚夷民甚好解朝甚除田甚蕪倉甚虛服文采帶利劍厭食貨財有餘是謂盜夸盜夸非道也善建者不拔善抱者不脫子孫以祭祀不絶修之身其德乃真修之家其德有餘修之鄉其德乃長修之邦其德乃豐修之天下其德乃溥以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此含德之厚者比於赤子逢𢔯𧍥地弗螫攫鳥猛獸弗搏骨弱筋柔而握固未知牝牡之會而朘怒精之至也終曰號而不愛和之至也和曰常知和曰明益生曰祥心使氣曰強物壯即老胃之不道不道早已知者弗言言者弗知塞其悶閉其門和其光同其𡑁坐其閲解其紛是胃玄同故不可得而親亦不可得而疏不可得而利亦不可得而害不可得而貴亦不可得而淺故為天下貴以正之邦以畸用兵以無事取天下吾何以知其然也𢦏夫天下多忌諱而民彌貧民多利器而邦家茲昏人多知而何物茲起法物滋章而盜賊多有是以聖人之言曰我無為也而民自化我好靜而民自正我無事民自富我欲不欲而民自朴其政閔閔其邦屯屯其正察察其邦夬夬𢢸福之所倚福𢢸之所伏孰知其極其無正也正復為奇善復為妖人之迷也其日固久矣是以方而不割廉而不刺直而不紲光而不曜治人事天莫若嗇夫惟嗇是以早服早服是謂重積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長久是胃深槿固氐長生久視之道也治大國若烹小鮮以道蒞天下其鬼不神非其鬼不神也其神不傷人也非其申不傷人也聖人亦弗傷也夫兩不相傷故德交歸焉大邦者下流也天下之牝天下之郊也牝恆以靚勝牡為其靚也故宜為下大邦以下小邦則取小邦小邦以下大邦則取於大邦故或下以取或下而取故大邦者不過欲兼畜人小邦者不過欲入事人夫皆得其欲故大邦者宜為下道者萬物之注也善人之𤨷也不善人之所𤨷也美言可以市尊行可以賀人人之不善也何棄之有故立天子置三卿雖有共之璧以先四馬不善坐而進此古之所以貴此者何也不胃求以得有罪以免輿故為天下貴為無為事無事味無未大小多少報怨以德圖難乎其易也為大乎其細也天下之難作於易天下之大作於細是以聖人冬不為大故能成其大夫輕諾者必寡信多易必多難是以聖人猷難之故終於無難其安也易持也其未兆也易謀也其脆也易判也其微也易散也為之於其未有治之於其未亂也合抱之木生於毫末九成之臺作於羸土百仁之高台於足下為之者敗之執之者失之聖人無為也故無敗也無執也故無失也民之從事也恆於其成事而敗之故慎終若始則無敗事矣是以聖人欲不欲而不貴難得之學不學而復衆人之所過能輔萬物之自然而弗敢為故曰為道者非以明民也將以愚之也民之難治也以其知也故以知知邦邦之賊也以不知知邦邦之德也恆知此兩者亦稽式也恆知稽式此胃玄德玄德深矣遠矣與物反矣乃至大順江海之所以能為百浴王者以其善下之是以能為百浴王是以聖人之欲上民也必以其言下之其欲先民也必以其身後之故居前而民弗害也居上而民弗重也天下樂隼而弗猒也非以其無諍與故天下莫能與小邦民使十百人之器毋用使民重死而遠送有車周無所乘之有甲兵無所陳之使民復結繩而用之甘其食美其服樂其俗安其居邦相雞狗之聲相聞民至老死不相往來信言不美美言不信知者不博博者不知善者不多多者不善聖人無積既以為人己愈有既以豫人己愈多故天之道利而不害人之道為而弗爭天下皆謂我大不肖夫唯大故不宵若宵細久矣我恆有三葆之一曰茲二曰檢三曰不敢為天下先夫慈故能勇儉故能廣不敢為天下先故能為成事長今舍其茲且勇舍其後且先則必死矣夫茲以戰則勝以守則固天將建之女以茲垣之善為士者不武善戰者不怒善勝敵者弗與善用人者為之下是胃不靜之德是胃用人是胃天古之極也用兵有言曰吾不敢為主而為客吾不進寸而芮尺是胃行無行襄無臂執無兵乃無敵矣𢢸莫於於無適無適斤亡吾吾葆矣故稱兵相若則哀者勝矣吾言甚易知也甚易行也而人莫之能知也而莫之能行也言有君事有宗夫唯無知也是以不我知知我者希則我貴矣是以聖人被褐而褱玉知不知尚矣不知不知病矣是以聖人之不病以其病病是以不病民之不畏畏則大威將至矣母閘其所居毋猒其所生夫唯弗猒是以不厭是以聖人自知而不自見也自愛而不自貴也故去被取此勇於敢者則殺勇於不敢者則栝知此兩者或利或害天之所惡孰知其故天之道不戰而善勝不言而善應不召而自來彈而善謀天網恢恢疏而不失若民恆且不畏死奈何以殺愳之也若民恆是死則而為者吾將得而殺之夫孰敢矣若民恆且必畏死則恆有司殺者夫伐司殺者殺是伐大匠斫也夫伐大匠斫者則希不傷其手矣人之飢也以其取食𨓚之多也是以飢百姓之不治也以其上有以為也是以不治民之巠死以其求生之厚也是以巠死夫唯無以生為者是賢貴生人之生也柔弱其死也𦵕仞賢強萬物草木之生也柔脆其死生𣒞𩫓故曰堅強者死之徒也柔弱微細生之徒也兵強則不勝木強則恆強大居下柔弱微細居上天下之道猶張弓者也高者印之下者舉之有餘者𢿃之不足者補之故天之道𢿃有餘而補不足人之道則不然𢿃不足以奉有餘孰能有餘而有以取奉於天者乎唯有道者乎是以聖人為而弗有成功而弗居也若此其不欲見賢也天下莫柔弱於水而攻堅強者莫之能先也以其無以易之也故柔勝剛弱勝強天下莫不知而莫能行也故聖人之言云曰受邦之詬是胃社稷之主受邦之不祥是胃天下之王正言若反和大怨必有餘怨焉可以為善是以聖右介而不以責於人故有德司介無德司勶夫天道無親恆與善人
