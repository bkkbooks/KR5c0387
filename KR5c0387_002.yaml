body:
  text: 馬王堆漢墓帛書老子甲本道經道可道也非恆道也名可名也非恆名也無名萬物之始也有名萬物之母也故恆無欲也以觀其眇恆有欲也以觀其所噭兩者同出異名同胃玄之有玄衆眇之門天下皆知美為美惡已皆知善訾不善矣有無之相生也難易之相成也長短之相刑也高下之相盈也意聲之相和也先後之相隋恆也是以聲人居無為之事行不言之教萬物作而弗始也為而弗志也成功而弗居也夫唯居是以弗去不上賢使民不爭不貴難得之貨使民不為盜不見可欲使民不亂是以聲人之治也虛其心實其腹弱其志強其骨恆使民無知無欲也使夫知不敢弗為而已則無不治矣道冲而用之又弗盈也潚呵始萬物之宗銼其解其紛和其光同其塵湛呵似或存吾不知誰子也象帝之先天地不仁以萬物為芻狗聲人不仁以百省為芻狗天地之間其猶橐籥輿虛而不淈踵而俞出多聞數窮不若守於中浴神不死是胃玄牝玄牝之門是胃天地之根綿綿呵若存用之不堇天長地久天地之所以能長且久者以其不自生也故能長生是以聲人芮其身而身先外其身而身存不以其無私輿故能成其私上善治水水善利萬物而有靜居衆之所惡故幾於道矣居善地心善潚豫善信正善治事善能蹱善時夫唯不靜故無尤㨁而盈之不若其已揣而之可長葆之金玉盈室莫之守也貴富而䮦自遺咎也功述身芮天之道也戴營魄抱一能毋離乎槫氣至柔能嬰兒乎修除玄藍能毋疵乎愛民活國能毋以知乎天門啓闔能為雌乎明白四達能毋以為乎生之畜之生而弗有長而弗宰是謂玄德卅輻同一轂當其無有車之用也然埴為器當其無有埴器之用也鑿戶牖當其無有室之用也故有之以為利無之以為用五色使人目明馳騁田臘使人心發狂難得之𧷴使人之行方五味使人之口𠷹五音使人之耳聾是以聲人之治也為腹不為目故去罷耳此龍辱若驚貴大梡若身苛胃龍辱若驚龍之為下得之若驚失之若驚是胃龍辱若驚何胃貴大梡若身吾所以有大梡者為吾有身也及吾無身有何梡故貴為身於為天下若可以𨒙天下矣愛以身為天下女何以寄天下視之而弗見名之曰微聽之而弗聞名之曰希捪之而弗得名之曰夷三者不可至計故而為一一者其上不𠈅其下不忽尋尋呵不可名也復歸於無物是胃無狀之狀無物之象是謂忽恍隨而不見其後迎而不見其首執今之道以御今之有以知古始是胃道紀古之善為道者微妙玄達深不可志夫唯不可志故強為之容曰與呵其若冬涉水猶呵其若畏四鄰嚴呵其若客渙呵其若淩澤呵其若楃湷呵其若濁𣼥呵其若浴濁而情之余清女以重之余生葆此道不欲盈夫唯不欲盈是以能敝而不成至虛極也守情表也萬物旁作吾以觀其復也天物雲雲各復歸於其根曰靜情是胃復命復命常也知常明也不知常㠵㠵作凶知常容容乃公公乃王王乃天天乃道道乃久沕身不怠大上下知有之其次親譽之其次畏之其下母之信不足案有不信猶呵其貴言也成功遂事而百省胃我自然故大道廢案有仁義知快出案有大僞六親不和案有畜茲邦家𨴽亂案有貞臣絶聲棄知民利百負絶仁棄義民復畜茲絶巧棄利盜賊無有此三言也以為文未足故令之有所屬見素抱朴少私寡欲絶學無憂唯與訶其相去幾何美與惡其相去何若人之所畏亦不可以不畏恍呵其未央哉衆人巸巸若鄉於大牢而春登臺我泊焉未佻若嬰兒未咳纍呵如無所歸衆人皆有餘我獨遺我禺人之心也蠢蠢呵鬻人昭昭我獨若𦟲呵鬻人蔡蔡我獨𨴽𨴽呵忽呵其若海望呵其若無所止衆人皆有以我獨頑以悝吾欲獨異於人而貴食母孔德之容唯道是從道之物唯望唯忽忽呵恍呵中有象呵望呵忽呵中有物呵𣾧呵嗚呵中有請吔其請甚真其中有信自今及古其名不去以順衆𠇑吾何以知衆𠇑之然以此炊者不立自視不章自見者不明自伐者無功自矜者不長其在道曰𥺌食贅行物或惡之故有欲者弗居曲則金枉則定窪則盈敝則新少則得多則惑是以聲人執一以為天下牧不自視故明不自見故章不自伐故有功弗矜故能長夫唯不爭故莫能與之爭古之所謂曲全者幾語才誠金歸之希言自然飄風不冬朝暴雨不冬日孰為此天地而弗能久又况於人乎故從事而道者同於道德者同於德者者同於失同德者道亦德之同於失者道亦失之有物昆成先天地生繡呵繆呵獨立而不改可以為天地母吾未知其名字之曰道吾強為之名曰大大曰筮筮曰遠遠曰反道大天大地大王亦大國中有四大而王居一焉人法地地法天天法道道法自然重為巠根清為躁君是以君子衆日行不離其災重唯有環官燕處則昭若若何萬乘之王而以身巠於天下巠則失本躁則失君善行者無勶迹善言者無瑕適善數者不以檮𥮥善閉者無籥而不可啓也善結者無𦄿約而不可解也是以聲人恆善㤹人而無棄人物無棄財是胃明故善人善人之師不善人善人之齎也不貴其師不愛其齎唯知乎大眯是胃眇要知其雄守其雌為天下溪為天下溪恆德不雞恆不雞復歸嬰兒知其白守其辱為天下為天下浴恆德乃足德乃足復歸於朴知其守其黑為天下式為天下式恆德不貣德不貣復歸於無極楃散則為器聖人用則為官長夫大制無割將欲取天下而為之吾見其弗得已夫天下神器也非可為者也為者敗之執者失之物或行或隨或炅或吹或強或挫或壞或撱是以聲人去甚去大去楮以道佐人主不以兵強於天下其事好還師之所居楚朸生之善者果而已矣毋以取強焉果而毋䮦果而勿矜果而勿伐果而毋得已居是胃果而不強物壯而老是胃之不道不道蚤已夫兵者不祥之器也物或惡之故有欲者弗居君子居則貴左用兵則貴右故兵者非君子之器也兵者不祥之器也不得已而用之銛襲為上勿美也若美之是樂殺人也夫樂殺人不可以得志於天下矣是以吉事上左喪事上右是以便將軍居左上將軍居右言以喪禮居之也殺人衆以悲依立之戰勝以喪禮處之道恆無名楃唯小而天下弗敢臣侯王若能守之萬物將自賓天地相谷以俞甘洛民莫之令而自均焉始制有名名亦既有夫亦將知止知止所以不殆俾道之在天下也猶小浴之與江海也知人者知也自知者明也勝人者有力也自勝者強也知足者富也強行者有志也不失其所者久也死不忘者壽也道泛呵其可左右也成功遂事而弗名有也萬物歸焉而弗為主則恆無欲也可名於小萬物歸焉而弗為主可名於大是以聲人之能成大也以其不為大也故能成大執大象天下往往而不害安平大樂與餌過格止故道之出言也曰談呵其無味也視之不足見也聽之不足聞也用之不可既也將欲拾之必古張之將欲弱之必固強之將欲去之必古與之將欲奪之必古豫之是胃微明友弱勝強魚不脫於潚邦利器不可以視人道恆無名侯王若守之萬物將自𢡺𢡺而欲作吾將鎮之以無名之楃鎮之以無名之楃夫將不辱不辱以情天地將自正
